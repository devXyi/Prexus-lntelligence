# render.yaml

services:

  - type: web
    name: prexus-intelligence
    runtime: go
    rootDir: backend/backend
    buildCommand: go build -o app ./apps/api-gateway/
    startCommand: ./app
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATA_ENGINE_URL
        fromService:
          name: meteorium-engine
          type: web
          property: url
      - key: ENGINE_SECRET
        sync: false

  - type: web
    name: meteorium-engine
    runtime: python
    rootDir: data-engine/python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn layer6.api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ENGINE_SECRET
        sync: false
      - key: NASA_FIRMS_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false