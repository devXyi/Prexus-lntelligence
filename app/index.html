<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prexus App</title>
</head>
<body>
<script>
  (function () {
    var token = localStorage.getItem('token') || localStorage.getItem('prx_token');
    if (token) {
      window.location.replace('/frontend/meteorium.html');
      return;
    }
    window.location.replace('/');
  })();
</script>
</body>
</html>
